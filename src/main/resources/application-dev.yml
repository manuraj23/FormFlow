server:
  port: 8082
  servlet:
    context-path: /formflow

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/formflow
    username: postgres
    password: 12345678

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true