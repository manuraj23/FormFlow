spring:
  application:
    name: FormFlow
  profiles:
    active: prod
  config:
    import: optional:file:.env[.properties]

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${SPRING_MAIL_USERNAME}
    password: ${SPRING_MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          ssl:
            trust: smtp.gmail.com
          auth: true
          starttls:
            enable: true

ai:
  gemini:
    api-key: ${GEMINI_API_KEY}
    api-base: ${GEMINI_API_BASE:https://generativelanguage.googleapis.com/v1beta}
    model: ${GEMINI_MODEL:gemini-2.5-flash}

