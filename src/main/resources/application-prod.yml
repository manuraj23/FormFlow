server:
  port: 8081
  servlet:
    context-path: /formflow

spring:
  datasource:
    url: jdbc:postgresql://prod-server:5432/formflow
    username: prod_user
    password: prod_password

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
