server:
  port: 8081
  servlet:
    context-path: /formflow

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/formflow
    username: postgres
    password: root123

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

logging:
  level:
    org.flywaydb: DEBUG
    org.springframework.boot.autoconfigure.flyway: DEBUG